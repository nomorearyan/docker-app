version: "3.8"

services:
  web:
    build: .
    container_name: docker-app
    ports:
      - "5000:5000"        # host_port:container_port
    environment:
      - PORT=5000
      - CONTAINER_NAME=docker-app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
